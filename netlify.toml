# Netlify configuration for elizaskander.com

[build]
  publish = "."

# Redirect root to index
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Form success redirect
[[redirects]]
  from = "/pages/contact.html"
  to = "/pages/contact.html?success"
  status = 200
  conditions = {method = ["POST"]}

# 404 fallback - only for truly missing pages
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
  force = false

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
